name: CashMate CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  loan-service:
    name: Build Loan Service
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: loan-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Docker image
        run: docker build -t cashmate-loan-service:ci .

  notification-service:
    name: Build Notification Service
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: notification-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Docker image
        run: docker build -t cashmate-notification-service:ci .
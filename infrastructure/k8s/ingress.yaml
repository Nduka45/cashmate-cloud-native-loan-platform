apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cashmate-ingress
  namespace: cashmate
spec:
  rules:
    - host: cashmate.local
      http:
        paths:
          - path: /api/loans
            pathType: Prefix
            backend:
              service:
                name: loan-service
                port:
                  number: 3000
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: loan-service
                port:
                  number: 3000
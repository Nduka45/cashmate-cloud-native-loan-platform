apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: cashmate

spec:
  replicas: 1

  selector:
    matchLabels:
      app: notification-service

  revisionHistoryLimit: 5

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  template:
    metadata:
      labels:
        app: notification-service

    spec:
      containers:
        - name: notification-service
          image: ghcr.io/nduka45/cashmate-notification-service:v1
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 3006

          env:
            - name: PORT
              value: "3006"

            - name: DB_HOST
              value: "postgres"

            - name: DB_PORT
              value: "5432"

            - name: DB_NAME
              value: "cashmate"

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: cashmate-secrets
                  key: DB_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cashmate-secrets
                  key: DB_PASSWORD

            - name: KAFKA_BROKER
              value: "kafka:9092"

          startupProbe:
            httpGet:
              path: /health
              port: 3006
            failureThreshold: 30
            periodSeconds: 5

          readinessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 10
            periodSeconds: 10

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
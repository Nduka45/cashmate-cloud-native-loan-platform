apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: cashmate

spec:
  replicas: 2

  selector:
    matchLabels:
      app: api-gateway

  revisionHistoryLimit: 5

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  template:
    metadata:
      labels:
        app: api-gateway

    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/nduka45/cashmate-api-gateway:v1
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 4000

          env:
            - name: PORT
              value: "4000"

            - name: CUSTOMER_SERVICE_URL
              value: "http://customer-service:3001"

            - name: LOAN_SERVICE_URL
              value: "http://loan-service:3000"

            - name: CREDIT_SERVICE_URL
              value: "http://credit-service:3002"

            - name: DISBURSEMENT_SERVICE_URL
              value: "http://disbursement-service:3004"

            - name: PAYMENT_SERVICE_URL
              value: "http://payment-service:3005"
              
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:3006"

          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 20

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-service
  namespace: cashmate

spec:
  replicas: 2

  selector:
    matchLabels:
      app: customer-service

  revisionHistoryLimit: 5

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  template:
    metadata:
      labels:
        app: customer-service

    spec:
      containers:
        - name: customer-service
          image: ghcr.io/nduka45/cashmate-customer-service:latest
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 3001

          env:
            - name: PORT
              value: "3001"

            - name: DB_HOST
              value: "postgres"

            - name: DB_PORT
              value: "5432"

            - name: DB_NAME
              value: "cashmate"

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: cashmate-secrets
                  key: DB_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cashmate-secrets
                  key: DB_PASSWORD

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cashmate-secrets
                  key: JWT_SECRET

          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 20

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
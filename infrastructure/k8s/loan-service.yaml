apiVersion: apps/v1
kind: Deployment
metadata:
  name: loan-service
  namespace: cashmate
spec:
  replicas: 2
  selector:
    matchLabels:
      app: loan-service
  template:
    metadata:
      labels:
        app: loan-service
    spec:
      containers:
        - name: loan-service
          image: cashmate-loan-service:1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: development
            - name: JWT_SECRET
              value: cashmate-dev-secret
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: cashmate
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: loan-service
  namespace: cashmate
spec:
  selector:
    app: loan-service
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
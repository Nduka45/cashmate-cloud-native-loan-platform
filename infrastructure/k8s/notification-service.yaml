apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: cashmate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: cashmate-notification-service:1.0
          imagePullPolicy: Never
          env:
            - name: KAFKA_BROKER
              value: "kafka:9092"
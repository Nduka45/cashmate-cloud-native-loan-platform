services:
  postgres:
    image: postgres:16-alpine
    container_name: cashmate-postgres
    environment:
      POSTGRES_DB: cashmate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - cashmate_postgres_data:/var/lib/postgresql/data
      - ../../loan-service/src/config/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  kafka:
  image: bitnami/kafka:3.7.0
  container_name: cashmate-kafka
  ports:
    - "9092:9092"
  environment:
    KAFKA_CFG_NODE_ID: 0
    KAFKA_CFG_PROCESS_ROLES: broker,controller

    KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
    KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092

    KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
    KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER

    ALLOW_PLAINTEXT_LISTENER: "yes"

  loan-service:
    build:
      context: ../../loan-service
      dockerfile: Dockerfile
    container_name: cashmate-loan-service
    environment:
      PORT: 3000
      NODE_ENV: development
      JWT_SECRET: cashmate-dev-secret

      # DB config
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: cashmate
      DB_USER: postgres
      DB_PASSWORD: postgres

      # Kafka config (IMPORTANT FIX)
      KAFKA_BROKER: kafka:9092

    ports:
      - "3001:3000"
    depends_on:
      - postgres
      - kafka

volumes:
  cashmate_postgres_data:
name: Deploy CashMate to EKS

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  deploy-eks:
    name: Deploy to AWS EKS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region eu-central-1 \
            --name cashmate-eks

      - name: Debug repository
        run: |
          echo "Current commit:"
          git rev-parse HEAD
          echo "Searching for services references:"
          grep -R "services" infrastructure/k8s || true

      - name: Show Debug repository
        run: |
          echo "Current commit:"
          git rev-parse HEAD
          
          echo "Searching for services references:"
          grep -R "services" infrastructure/k8s || true
          
          echo "EKS kustomization:"
          cat infrastructure/k8s/overlays/eks/kustomization.yaml

          echo "Local kustomization:"
          cat infrastructure/k8s/overlays/local/kustomization.yaml

      - name: Render EKS manifests
        run: |
          kubectl kustomize infrastructure/k8s/overlays/eks > eks-rendered.yaml
          test -s eks-rendered.yaml

      - name: Deploy to EKS
        run: |
          kubectl apply -k infrastructure/k8s/overlays/eks

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/api-gateway -n cashmate
          kubectl rollout status deployment/customer-service -n cashmate
          kubectl rollout status deployment/loan-service -n cashmate
          kubectl rollout status deployment/credit-service -n cashmate
          kubectl rollout status deployment/disbursement-service -n cashmate
          kubectl rollout status deployment/payment-service -n cashmate
          kubectl rollout status deployment/notification-service -n cashmate